; Alembic configuration for feedback-triage-app.
;
; - ``sqlalchemy.url`` is intentionally blank; ``alembic/env.py`` reads
;   ``DATABASE_URL`` from the process environment via the app's
;   ``Settings`` so dev and prod share one source of truth.
; - Migration scripts live under ``alembic/versions/`` and use a numeric
;   prefix + slug (e.g. ``0001_create_feedback_item.py``).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

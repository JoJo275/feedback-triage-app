# ──────────────────────────────────────────────────────────────
# Type Check Workflow
# ──────────────────────────────────────────────────────────────
# Runs mypy in strict mode against the src/ package to enforce
# type annotations and catch type errors at CI time.
#
# Triggers:
#   - Push to main
#   - Pull requests targeting main
#   - Manual dispatch via the GitHub Actions UI
#
# Configuration lives in pyproject.toml under [tool.mypy].
#
# ci-gate required — do not add paths-ignore (see ci-gate.yml).
# ──────────────────────────────────────────────────────────────

name: Type check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: mypy (strict)    # ci-gate: required

    # ── Repository guard ──────────────────────────────────────
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  – Edit the hardcoded slug below.
    #   Option B  – Set vars.ENABLE_TYPE_CHECK = 'true'.
    if: >-
      ${{
        github.repository == 'OWNER/REPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_TYPE_CHECK == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and add… (v6.2.0)
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # Install uv with caching (v8.1.0)
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      # Install the project (editable, via uv sync) plus the dev extras
      # which include mypy. uv resolves both from the committed lockfile
      # so type-checks see the same versions as local development.
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # Runs mypy against the src/ package. Configuration
      # (strict mode, overrides, etc.) is read from pyproject.toml.
      - name: Run mypy
        run: uv run mypy src/

# Runs pytest across Python 3.11, 3.12, and 3.13.
# Triggered on push/PR to main or manual dispatch.
# ci-gate required — do not add paths-ignore (see ci-gate.yml).

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Manual trigger

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})    # ci-gate: required

    # ── Repository guard ──────────────────────────────────────
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  – Edit the hardcoded slug below.
    #   Option B  – Set vars.ENABLE_TEST = 'true'.
    if: >-
      ${{
        github.repository == 'OWNER/REPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_TEST == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    # The test suite talks to a real Postgres (no SQLite — see spec
    # § Testing). The service container exposes 5432 on the runner so
    # the default DATABASE_URL in src/feedback_triage/config.py works
    # without overrides.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: feedback
          POSTGRES_PASSWORD: feedback
          POSTGRES_DB: feedback
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feedback -d feedback"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://feedback:feedback@localhost:5432/feedback

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and add… (v6.2.0)
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # Install uv with caching (v8.1.0)
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Install dependencies
        run: uv sync --frozen --extra test

      - name: Apply database migrations
        run: uv run alembic upgrade head

      # Run unit tests only. Integration tests (marked with
      # @pytest.mark.integration) are excluded from the PR matrix
      # to keep feedback fast. They can be run separately or
      # included by removing the -m filter.
      #
      # NOTE: The coverage workflow (coverage.yml) runs ALL tests
      # including integration tests to get accurate coverage numbers.
      # This workflow prioritizes fast feedback over completeness.
      - name: Run tests
        run: uv run pytest -v -m "not integration and not e2e"

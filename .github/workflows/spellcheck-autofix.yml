# Creates a PR to auto-fix spelling mistakes using codespell.
# Runs weekly on Mondays or via manual trigger.
# Can be disabled by deleting this file or adding a repository guard.

name: Spellcheck Autofix PR

on:
  workflow_dispatch: {}
  schedule:
    # Cron is a Unix time-scheduling syntax and the only way to
    # define scheduled triggers in GitHub Actions. It uses five
    # fields (all in UTC):
    #
    #   в”Њв”Ђв”Ђв”Ђ minute (0вЂ“59)
    #   в”‚ в”Њв”Ђв”Ђв”Ђ hour (0вЂ“23)
    #   в”‚ в”‚ в”Њв”Ђв”Ђв”Ђ day of month (1вЂ“31)
    #   в”‚ в”‚ в”‚ в”Њв”Ђв”Ђв”Ђ month (1вЂ“12)
    #   в”‚ в”‚ в”‚ в”‚ в”Њв”Ђв”Ђв”Ђ day of week (0=Sun вЂ¦ 6=Sat)
    #   в”‚ в”‚ в”‚ в”‚ в”‚
    #   * * * * *
    #
    # Because cron is fixed to UTC, local time shifts with DST (Daylight Saving Time):
    #   09:00 UTC = 04:00 EST (NovвЂ“Mar) / 05:00 EDT (MarвЂ“Nov)
    - cron: "0 9 * * 1" # Monday 09:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Auto-fix typos

    # в”Ђв”Ђ Repository guard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  вЂ“ Edit the hardcoded slug below.
    #   Option B  вЂ“ Set vars.ENABLE_SPELLCHECK_AUTOFIX = 'true'.
    if: >-
      ${{
        github.repository == 'OWNER/REPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_SPELLCHECK_AUTOFIX == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and addвЂ¦ (v6.2.0)
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install codespell
        run: python -m pip install --upgrade pip codespell

      - name: Run codespell (apply fixes)
        run: |
          codespell \
            --write-changes \
            --check-filenames \
            --check-hidden \
            --skip ".git,.venv,dist,build,__pycache__,.mypy_cache,.ruff_cache,*.egg-info,site,_typos.toml,*.min.js" \
            .

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # Creates a pull request for changes to yourвЂ¦ (v8.1.0)
        with:
          commit-message: "chore(spellcheck): auto-fix typos"
          title: "chore(spellcheck): auto-fix typos"
          body: |
            Automated spelling fixes generated by codespell.
            Review for false positives before merging.
          branch: "bot/spellcheck-autofix"
          delete-branch: true
          # TODO (template users): Ensure these labels exist in your repo
          # before enabling this workflow. See labels/ for label definitions
          # and scripts/apply_labels.py to sync them.
          labels: "type: chore,documentation"

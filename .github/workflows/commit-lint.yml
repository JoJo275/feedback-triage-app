# ──────────────────────────────────────────────────────────────
# Commit Message Lint Workflow
# ──────────────────────────────────────────────────────────────
# Validates that all commits in a PR follow Conventional Commits.
#
# With rebase+merge, every commit lands individually on main —
# so every commit message matters for changelog generation.
# This workflow ensures commits are well-formed BEFORE merging.
#
# Locally, commitizen's pre-commit hook validates at commit time.
# This CI check is the safety net for environments without hooks.
#
# Triggers:
#   - Pull requests targeting main
#
# TODO (template users):
#   1. Enable the repository guard (pick ONE):
#        Option A – Replace 'OWNER/REPO' below.
#        Option B – Set vars.ENABLE_COMMIT_LINT = 'true'.
# ──────────────────────────────────────────────────────────────

name: Commit Lint

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-commits:
    name: Validate commit messages    # ci-gate: required

    # ── Repository guard ──────────────────────────────────────
    if: >-
      ${{
        github.repository == 'OWNER/REPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_COMMIT_LINT == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Checkout a Git repository at a particular version (v6.0.2)
        with:
          fetch-depth: 0             # Full history needed to check all PR commits
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # Set up a specific version of Python and add… (v6.2.0)
        with:
          python-version: "3.12"

      # Validate every commit subject line in the PR range against the
      # Conventional Commits regex. We deliberately bypass `cz check`
      # here because commitizen escalates *any* unrecognised body line
      # (including Copilot's ``Co-authored-by:`` trailers and the
      # multi-paragraph bodies we use for fork-bring-up commits) to a
      # whole-message failure.
      #
      # Rationale: release-please only reads the subject line; if the
      # subject is conventional, the changelog is correct.
      - name: Check commit subjects (Conventional Commits)
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          range="${base}..HEAD"
          echo "Checking subjects in range: ${range}"

          pattern='^(build|bump|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?!?: .+'
          fail=0
          while read -r sha; do
            [ -z "${sha}" ] && continue
            subject=$(git log -1 --format='%s' "${sha}")
            if [[ "${subject}" =~ ${pattern} ]]; then
              echo "ok    ${sha:0:7}  ${subject}"
            else
              echo "BAD   ${sha:0:7}  ${subject}"
              fail=1
            fi
          done < <(git rev-list --reverse "${range}")

          if [ "${fail}" -ne 0 ]; then
            echo ""
            echo "::error::One or more commit subjects do not match Conventional Commits."
            echo "Allowed types: build, bump, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
            echo "Format: <type>(<scope>)?: <description>"
            exit 1
          fi

# ──────────────────────────────────────────────────────────────
# Coverage Workflow
# ──────────────────────────────────────────────────────────────
# Runs pytest with coverage measurement and uploads the report
# to Codecov. Provides coverage badges and PR comments showing
# how coverage changes with each PR.
#
# Triggers:
#   - Push to main
#   - Pull requests targeting main
#   - Manual dispatch via the GitHub Actions UI
#
# TODO (template users):
#   1. Enable the repository guard (pick ONE):
#        Option A – Replace 'OWNER/REPO' below with
#                   your actual repo slug (e.g. 'myorg/myproject').
#        Option B – Set a repository variable (no YAML edits needed):
#                     vars.ENABLE_COVERAGE = 'true'
#                   (Settings → Secrets and variables → Actions → Variables)
#   2. Sign up at https://codecov.io and add your repo.
#   3. Add a CODECOV_TOKEN secret for private repos.
#      (Public repos work without a token but it's recommended.)
#      (Settings → Secrets and variables → Actions → Secrets)
#   4. (Optional) Add a codecov.yml config file to customize
#      coverage thresholds, flags, and PR comment behavior.
#      See: https://docs.codecov.com/docs/codecov-yaml
#
# ci-gate required — do not add paths-ignore (see ci-gate.yml).
# ──────────────────────────────────────────────────────────────

name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Test + upload coverage    # ci-gate: required

    # ── Repository guard ──────────────────────────────────────
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  – Edit the hardcoded slug below.
    #   Option B  – Set vars.ENABLE_COVERAGE = 'true'.
    if: >-
      ${{
        github.repository == 'OWNER/REPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_COVERAGE == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Tests run against a real Postgres — see test.yml for the rationale.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: feedback
          POSTGRES_PASSWORD: feedback
          POSTGRES_DB: feedback
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feedback -d feedback"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://feedback:feedback@localhost:5432/feedback

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and add… (v6.2.0)
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # Install uv with caching (v8.1.0)
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      # Install the project with test extras using the committed lockfile.
      # The [test] optional-dependency group in pyproject.toml is the
      # single source of truth for pytest + pytest-cov.
      - name: Install dependencies
        run: uv sync --frozen --extra test

      - name: Apply database migrations
        run: uv run alembic upgrade head

      # Run tests with coverage. Configuration (source dirs,
      # branch coverage, exclusions) is read from pyproject.toml
      # under [tool.coverage.run] and [tool.coverage.report].
      #
      # NOTE: This runs ALL tests (no -m filter) to get accurate
      # coverage numbers. The test workflow (test.yml) excludes
      # integration tests for faster feedback. Coverage needs
      # the full picture, so we include everything here.
      - name: Run tests with coverage
        run: uv run pytest -m "not e2e" --cov=feedback_triage --cov-report=xml --cov-report=html --cov-report=term-missing

      # Upload the coverage report to Codecov.
      # For private repos, set the CODECOV_TOKEN secret.
      # For public repos, the token is optional but recommended.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # Uploads coverage reports for your repository… (v5.5.2)
        with:
          files: coverage.xml
          fail_ci_if_error: false  # Don't fail CI if upload fails
          token: ${{ secrets.CODECOV_TOKEN }}

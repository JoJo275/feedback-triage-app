# =============================================================================
# Dependabot Configuration — feedback-triage-app
# =============================================================================
# Automated dependency update PRs.
#
# Ecosystems covered:
#   - github-actions  (action SHA pins in .github/workflows/)
#   - pip             (PEP 621 floor pins in pyproject.toml)
#   - uv              (uv.lock pinned graph)
#   - docker          (Containerfile base image digests)
#
# Why both `pip` and `uv` ecosystems:
#   - `pip` raises the >= floors declared in pyproject.toml so a fresh
#     `uv sync` on a teammate's box doesn't silently regress.
#   - `uv` updates uv.lock so the actually-installed graph stays current
#     between floor bumps.
#
# Docs:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# =============================================================================

version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Python — PEP 621 floors in pyproject.toml ───────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    rebase-strategy: "disabled"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Python — uv.lock pinned graph ───────────────────────────
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "uv"
    open-pull-requests-limit: 10
    rebase-strategy: "disabled"
    groups:
      uv-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Pre-commit Hooks ────────────────────────────────────────
  # NOTE: Dependabot does not support .pre-commit-config.yaml natively.
  # Use the pre-commit-update workflow or `pre-commit autoupdate`.

  # ── Container Base Images (Containerfile) ───────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      docker-minor-patch:
        update-types:
          - "minor"
          - "patch"

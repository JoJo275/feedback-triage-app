{% extends "_base.html" %} {% block title %}Set a new password — Feedback
Triage{% endblock %} {% block body %}
<main id="main" class="sn-page-shell">
    <div class="sn-content-gutter sn-stack">
        <header>
            <h1>Set a new password</h1>
        </header>
        <form id="reset-form" class="sn-stack" novalidate>
            <input type="hidden" name="token" value="{{ token }}" />
            <div>
                <label for="new_password">New password</label>
                <input
                    id="new_password"
                    name="new_password"
                    type="password"
                    autocomplete="new-password"
                    minlength="12"
                    required
                />
                <small>Minimum 12 characters.</small>
            </div>
            <button type="submit">Update password</button>
            <p id="reset-error" class="sn-form-error" role="alert" hidden></p>
            <p id="reset-success" role="status" hidden>
                Password updated.
                <a href="/login">Sign in with your new password</a>.
            </p>
        </form>
    </div>
</main>
<script src="/static/js/auth.js" defer></script>
{% endblock %}

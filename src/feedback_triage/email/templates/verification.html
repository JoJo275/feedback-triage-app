<!doctype html>
<html lang="en">
    <body
        style="
            margin: 0;
            padding: 0;
            font-family:
                -apple-system,
                Segoe UI,
                sans-serif;
            color: #111;
            background: #f6f7f9;
        "
    >
        <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="background: #f6f7f9; padding: 32px 0"
        >
            <tr>
                <td align="center">
                    <table
                        role="presentation"
                        width="520"
                        cellpadding="0"
                        cellspacing="0"
                        style="
                            background: #ffffff;
                            border-radius: 8px;
                            padding: 32px;
                        "
                    >
                        <tr>
                            <td>
                                <h1 style="margin: 0 0 16px 0; font-size: 20px">
                                    Confirm your email
                                </h1>
                                <p style="margin: 0 0 16px 0; line-height: 1.5">
                                    Hi {{ recipient_name }},
                                </p>
                                <p style="margin: 0 0 16px 0; line-height: 1.5">
                                    Thanks for signing up. Click the button
                                    below to verify this email address and
                                    finish creating your account.
                                </p>
                                <p style="margin: 24px 0">
                                    <a
                                        href="{{ verify_url }}"
                                        style="
                                            display: inline-block;
                                            padding: 12px 20px;
                                            background: #2b6cb0;
                                            color: #fff;
                                            text-decoration: none;
                                            border-radius: 6px;
                                            font-weight: 600;
                                        "
                                        >Verify email</a
                                    >
                                </p>
                                <p
                                    style="
                                        margin: 0 0 16px 0;
                                        line-height: 1.5;
                                        color: #555;
                                        font-size: 14px;
                                    "
                                >
                                    This link expires in {{ expires_in_hours }}
                                    hours. If you did not sign up, you can
                                    ignore this message.
                                </p>
                                <p
                                    style="
                                        margin: 0;
                                        line-height: 1.5;
                                        color: #555;
                                        font-size: 13px;
                                        word-break: break-all;
                                    "
                                >
                                    {{ verify_url }}
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>

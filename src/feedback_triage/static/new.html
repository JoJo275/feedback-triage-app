<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>New feedback · Feedback Triage</title>
        <link rel="stylesheet" href="/static/css/styles.css" />
    </head>
    <body>
        <header class="site-header">
            <h1><a href="/">Feedback Triage</a></h1>
            <nav>
                <a class="button button-ghost" href="/">Back to list</a>
            </nav>
        </header>

        <main id="main" class="container">
            <h2>Create feedback</h2>
            <p id="form-error" class="error" role="alert" hidden></p>

            <form id="create-form" class="stacked-form" novalidate>
                <div class="field">
                    <label for="title">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        maxlength="200"
                        required
                        aria-describedby="title-help"
                    />
                    <small id="title-help"
                        >Up to 200 characters. Required.</small
                    >
                </div>

                <div class="field">
                    <label for="description">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        rows="6"
                        maxlength="5000"
                        aria-describedby="description-help"
                    ></textarea>
                    <small id="description-help"
                        >Optional. Up to 5000 characters.</small
                    >
                </div>

                <div class="field">
                    <label for="source">Source</label>
                    <select id="source" name="source" required>
                        <option value="email">Email</option>
                        <option value="interview">Interview</option>
                        <option value="reddit">Reddit</option>
                        <option value="support">Support</option>
                        <option value="app_store">App store</option>
                        <option value="twitter">Twitter</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="field">
                    <label for="pain_level">Pain level</label>
                    <select id="pain_level" name="pain_level" required>
                        <option value="1">1 — minor</option>
                        <option value="2">2</option>
                        <option value="3" selected>3 — moderate</option>
                        <option value="4">4</option>
                        <option value="5">5 — severe</option>
                    </select>
                </div>

                <div class="field">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="new" selected>New</option>
                        <option value="reviewing">Reviewing</option>
                        <option value="planned">Planned</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="button button-primary">
                        Create
                    </button>
                    <a class="button button-ghost" href="/">Cancel</a>
                </div>
            </form>
        </main>

        <script type="module" src="/static/js/new.js"></script>
    </body>
</html>

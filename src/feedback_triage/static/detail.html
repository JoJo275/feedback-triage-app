<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Edit feedback · SignalNest</title>
        <link rel="stylesheet" href="/static/css/styles.css" />
    </head>
    <body>
        <header class="site-header">
            <h1><a href="/">SignalNest</a></h1>
            <nav>
                <a class="button button-ghost" href="/">Back to list</a>
            </nav>
        </header>

        <main id="main" class="container">
            <h2>Edit feedback</h2>
            <p id="load-status" class="status" role="status" aria-live="polite">
                Loading…
            </p>
            <p id="form-error" class="error" role="alert" hidden></p>
            <p
                id="form-success"
                class="success"
                role="status"
                aria-live="polite"
                hidden
            ></p>

            <form id="edit-form" class="stacked-form" novalidate hidden>
                <dl class="meta">
                    <div>
                        <dt>ID</dt>
                        <dd id="meta-id">—</dd>
                    </div>
                    <div>
                        <dt>Created</dt>
                        <dd id="meta-created">—</dd>
                    </div>
                    <div>
                        <dt>Updated</dt>
                        <dd id="meta-updated">—</dd>
                    </div>
                </dl>

                <div class="field">
                    <label for="title">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        maxlength="200"
                        required
                    />
                </div>

                <div class="field">
                    <label for="description">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        rows="6"
                        maxlength="5000"
                    ></textarea>
                </div>

                <div class="field">
                    <label for="source">Source</label>
                    <select id="source" name="source" required>
                        <option value="email">Email</option>
                        <option value="interview">Interview</option>
                        <option value="reddit">Reddit</option>
                        <option value="support">Support</option>
                        <option value="app_store">App store</option>
                        <option value="twitter">Twitter</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="field">
                    <label for="pain_level">Pain level</label>
                    <select id="pain_level" name="pain_level" required>
                        <option value="1">1 — minor</option>
                        <option value="2">2</option>
                        <option value="3">3 — moderate</option>
                        <option value="4">4</option>
                        <option value="5">5 — severe</option>
                    </select>
                </div>

                <div class="field">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="new">New</option>
                        <option value="reviewing">Reviewing</option>
                        <option value="planned">Planned</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="button button-primary">
                        Save
                    </button>
                    <button
                        type="button"
                        id="delete-button"
                        class="button button-danger"
                    >
                        Delete
                    </button>
                    <a class="button button-ghost" href="/">Cancel</a>
                </div>
            </form>
        </main>

        <script type="module" src="/static/js/detail.js"></script>
    </body>
</html>

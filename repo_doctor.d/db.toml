# =============================================================================
# repo_doctor.d/db.toml — Postgres + Alembic schema/migration checks
# =============================================================================
# Activate: --profile db   or   profiles = ["db"] in [doctor]
#
# Verifies that the Postgres + SQLModel + Alembic stack is wired up
# correctly. Replaces the original template's SQLite/db/ layout.
# =============================================================================


# ---------------------------------------------------------------------------
# Alembic configuration
# ---------------------------------------------------------------------------

[[rule]]
type = "exists"
path = "alembic.ini"
kind = "file"
level = "warn"
category = "database"
impact = "alembic.ini missing — `alembic upgrade head` and the Railway pre-deploy command will fail."
hint = "Restore alembic.ini at repo root."
link = "docs/project/spec/spec-v1.md"

[[rule]]
type = "exists"
path = "alembic"
kind = "dir"
level = "warn"
category = "database"
impact = "alembic/ directory missing — Alembic env.py and migrations have no home."
hint = "Restore alembic/env.py, alembic/script.py.mako, and alembic/versions/."

[[rule]]
type = "exists"
path = "alembic/env.py"
kind = "file"
level = "warn"
category = "database"
impact = "alembic/env.py missing — Alembic can't connect to the database or load metadata."
only_if.path = "alembic"
only_if.regex = "(?s)."

[[rule]]
type = "exists"
path = "alembic/versions"
kind = "dir"
level = "warn"
category = "database"
impact = "alembic/versions/ missing — no migration revisions can be tracked."
only_if.path = "alembic"
only_if.regex = "(?s)."

[[rule]]
type = "regex_present"
path = "alembic/env.py"
regex = "compare_type\\s*=\\s*True"
level = "info"
category = "database"
impact = "alembic env.py doesn't set compare_type=True — autogenerated migrations will miss column-type changes."
hint = "Add compare_type=True (and compare_server_default=True) to context.configure() in env.py."
only_if.path = "alembic/env.py"
only_if.regex = "(?s)."

[[rule]]
type = "regex_present"
path = "alembic/env.py"
regex = "compare_server_default\\s*=\\s*True"
level = "info"
category = "database"
impact = "alembic env.py doesn't set compare_server_default=True — server-side default changes won't be detected by autogenerate."
hint = "Add compare_server_default=True to context.configure() in env.py."
only_if.path = "alembic/env.py"
only_if.regex = "(?s)."

[[rule]]
type = "regex_present"
path = "alembic/env.py"
regex = "DATABASE_URL"
level = "info"
category = "database"
impact = "alembic env.py doesn't reference DATABASE_URL — migrations may use a hardcoded URL or alembic.ini sqlalchemy.url instead of the env var."
hint = "Read the connection URL from os.environ['DATABASE_URL'] in env.py so dev/CI/prod share one source of truth."
only_if.path = "alembic/env.py"
only_if.regex = "(?s)."


# ---------------------------------------------------------------------------
# SQLModel models — single canonical source
# ---------------------------------------------------------------------------

[[rule]]
type = "exists"
path = "src/feedback_triage/models.py"
kind = "file"
level = "warn"
category = "database"
impact = "feedback_triage/models.py missing — SQLModel table definitions have no home; routes won't be able to import the ORM model."
hint = "Define the feedback_item table and any future tables in src/feedback_triage/models.py."

[[rule]]
type = "regex_present"
path = "src/feedback_triage/models.py"
regex = "(?i)class\\s+FeedbackItem"
level = "info"
category = "database"
impact = "models.py exists but defines no FeedbackItem class — the v1.0 single-table model is missing."
only_if.path = "src/feedback_triage/models.py"
only_if.regex = "(?s)."


# ---------------------------------------------------------------------------
# Native enums (status_enum, source_enum) — v1.0 conventions
# ---------------------------------------------------------------------------

[[rule]]
type = "exists"
path = "src/feedback_triage/enums.py"
kind = "file"
level = "info"
category = "database"
impact = "enums.py missing — Python-side Source/Status enums (mirrored to Postgres native enums) have no home."
hint = "Keep Source and Status as Python enum.Enum subclasses in src/feedback_triage/enums.py."


# ---------------------------------------------------------------------------
# Database session wiring
# ---------------------------------------------------------------------------

[[rule]]
type = "exists"
path = "src/feedback_triage/database.py"
kind = "file"
level = "warn"
category = "database"
impact = "database.py missing — there is no get_db dependency, so routes can't open per-request sessions."
hint = "Define engine, SessionLocal, and get_db() in src/feedback_triage/database.py with expire_on_commit=False."

[[rule]]
type = "regex_present"
path = "src/feedback_triage/database.py"
regex = "expire_on_commit\\s*=\\s*False"
level = "info"
category = "database"
impact = "database.py doesn't set expire_on_commit=False — committed objects will trigger SELECT statements on attribute access in handlers."
hint = "Set expire_on_commit=False on the sessionmaker."
only_if.path = "src/feedback_triage/database.py"
only_if.regex = "(?s)."

[[rule]]
type = "regex_present"
path = "src/feedback_triage/database.py"
regex = "DATABASE_URL|get_settings|Settings"
level = "info"
category = "database"
impact = "database.py doesn't reference DATABASE_URL or the Settings helper — the engine may use a hardcoded URL, breaking parity with Alembic and Railway."
hint = "Read DATABASE_URL via feedback_triage.config.get_settings() (or directly from os.environ) and pass it to create_engine."
only_if.path = "src/feedback_triage/database.py"
only_if.regex = "(?s)."


# ---------------------------------------------------------------------------
# docker-compose Postgres service for local dev
# ---------------------------------------------------------------------------

[[rule]]
type = "regex_present"
path = "docker-compose.yml"
regex = "(?i)image:\\s*postgres"
level = "info"
category = "database"
impact = "docker-compose.yml has no postgres service — `task up` won't start a local database for development or tests."
hint = "Add a postgres:16 service with a healthcheck to docker-compose.yml."
only_if.path = "docker-compose.yml"
only_if.regex = "(?s)."


# ---------------------------------------------------------------------------
# Migration hygiene
# ---------------------------------------------------------------------------

[[rule]]
type = "regex_present"
path = "alembic/versions"
regex = "\\.py$"
level = "info"
category = "database"
impact = "alembic/versions/ contains no .py revisions — there are no migrations yet, or autogenerate has never been run."
hint = "Create the initial revision with: task migration -- 'init'"
only_if.path = "alembic/versions"
only_if.regex = "(?s)."


# ---------------------------------------------------------------------------
# Test database parity (Postgres-only, never SQLite)
# ---------------------------------------------------------------------------

[[rule]]
type = "regex_present"
path = "tests"
regex = "(?i)sqlite"
level = "info"
category = "database"
impact = "tests/ references sqlite — this project mandates Postgres for tests; dialect drift will leak into CI."
hint = "Remove the sqlite reference; use the Postgres test fixture defined in tests/conftest.py."
only_if.path = "tests"
only_if.regex = "(?s)."


# ---------------------------------------------------------------------------
# Seed script
# ---------------------------------------------------------------------------

[[rule]]
type = "exists"
path = "scripts/seed.py"
kind = "file"
level = "info"
category = "database"
impact = "scripts/seed.py missing — there is no convenient way to populate demo data for local dev."
hint = "Add scripts/seed.py and wire `task seed` to it."

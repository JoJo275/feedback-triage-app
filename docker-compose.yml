# =============================================================================
# docker-compose.yml — local-dev stack for feedback-triage-app
# =============================================================================
# Two services:
#   db   — Postgres 16 with a named volume for persistence
#   app  — the FastAPI service built from Containerfile (optional; most
#          local-dev workflows run the app via `task dev` against this DB
#          instead of building the container every change).
#
# Common flows:
#   task up            # just Postgres
#   task dev           # FastAPI on host, talking to compose-postgres
#   task migrate       # alembic upgrade head
#
#   docker compose up app    # full container stack (smoke-tests Containerfile)
#
# DATABASE_URL is sourced from .env (see .env.example). Passwords are never
# committed; the app service inherits the value from the host environment.
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: feedback-triage-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-feedback}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedback} -d ${POSTGRES_DB:-feedback}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  app:
    profiles: ["container"]   # only started with: docker compose --profile container up
    build:
      context: .
      dockerfile: Containerfile
      args:
        VERSION: ${VERSION:-}
    image: feedback-triage-app:local
    container_name: feedback-triage-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://feedback:${POSTGRES_PASSWORD}@db:5432/feedback}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "8000"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  pgdata:

# https://taskfile.dev
# Install: https://taskfile.dev/installation/
#
# Usage:
#   task              # list project tasks (the default group)
#   task --list-all   # show every task including dev tooling and CI helpers
#
# Conventions:
#   - All commands run inside the uv-managed env via `uv run`.
#   - Project tasks (`dev`, `test`, `migrate`, etc.) come first.
#   - Dev-tooling tasks inherited from the template (doctor, repo, env)
#     are kept under their own headers; trim if they prove unused after
#     first green run.

version: "3"

silent: true

vars:
  PKG: feedback_triage

tasks:
  # ── Default ──────────────────────────────────────────────────
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Environment ─────────────────────────────────────────────
  sync:
    desc: Sync the project env from uv.lock (creates .venv if missing)
    cmds:
      - uv sync

  sync:all:
    desc: Sync with every optional dep group (dev, test, e2e, docs, dashboard)
    cmds:
      - uv sync --all-extras

  lock:
    desc: Refresh uv.lock from pyproject.toml
    cmds:
      - uv lock

  # ── Local app server ────────────────────────────────────────
  dev:
    desc: Run the FastAPI app with auto-reload (one-shot CSS build first)
    cmds:
      # One-shot CSS build so the page renders correctly on first hit.
      # Run `task watch:css` in a second terminal — or use `task dev:all`
      # to launch the watcher and the API server together.
      - task: build:css
      - uv run fastapi dev src/feedback_triage/main.py

  dev:server:
    desc: Run only the FastAPI dev server (no CSS build)
    internal: true
    cmds:
      - uv run fastapi dev src/feedback_triage/main.py

  dev:all:
    desc: Run the API server and the CSS watcher together (one terminal)
    deps:
      - build:css
    cmds:
      # `deps:` finishes before `cmds:`, so build:css completes first;
      # then dev:server and watch:css run in parallel via the second
      # `deps:` block in a wrapper task.
      - task: dev:parallel

  dev:parallel:
    desc: Run dev:server + watch:css concurrently (internal)
    internal: true
    deps:
      - dev:server
      - watch:css

  # ── Docker Compose (Postgres) ───────────────────────────────
  up:
    desc: Start docker-compose stack (Postgres)
    cmds:
      - docker compose up -d

  down:
    desc: Stop docker-compose stack
    cmds:
      - docker compose down

  down:volumes:
    desc: Stop docker-compose stack AND drop volumes (destroys DB data)
    prompt: This deletes the local Postgres volume. Continue?
    cmds:
      - docker compose down -v

  # ── Migrations (Alembic) ────────────────────────────────────
  migrate:
    desc: Apply migrations (alembic upgrade head)
    cmds:
      - uv run alembic upgrade head

  migration:
    desc: 'Generate a new migration: task migration -- "describe change"'
    cmds:
      - uv run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  migrate:downgrade:
    desc: "Roll back N revisions (default 1): task migrate:downgrade -- 1"
    cmds:
      - uv run alembic downgrade {{.CLI_ARGS | default "-1"}}

  # ── DB Backup / Restore (local dev only) ───────────────────
  # Production backups are handled by Railway. These tasks target the
  # docker-compose `db` service for local demo-data preservation.
  # Implementation lives in scripts/db_dump.py and scripts/db_restore.py
  # (cross-platform; replaces the prior PowerShell one-liners).
  db:dump:
    desc: "Dump local Postgres to ./backups/feedback-<timestamp>.sql"
    cmds:
      - uv run python scripts/db_dump.py {{.CLI_ARGS}}

  db:restore:
    desc: "Restore from a dump: task db:restore -- backups/feedback-<timestamp>.sql"
    prompt: This drops and recreates schema in the local Postgres. Continue?
    cmds:
      - uv run python scripts/db_restore.py {{.CLI_ARGS}} --yes

  # ── Seed ────────────────────────────────────────────────────
  seed:
    desc: Populate demo data (scripts/seed.py — added in Phase 2)
    cmds:
      - uv run python scripts/seed.py {{.CLI_ARGS}}

  # ── Testing ─────────────────────────────────────────────────
  test:
    desc: Run unit + API tests (excludes e2e)
    cmds:
      - uv run pytest -m "not e2e" {{.CLI_ARGS}}

  test:cov:
    desc: Run tests with coverage
    cmds:
      - uv run pytest -m "not e2e" --cov={{.PKG}} --cov-report=term-missing {{.CLI_ARGS}}

  test:e2e:
    desc: Run Playwright smoke suite (requires task up + task dev)
    cmds:
      - uv run pytest -m e2e {{.CLI_ARGS}}

  # ── Frontend (Tailwind via Standalone CLI) ─────────────────
  # See docs/project/spec/v2/css.md and ADR 058. Output is the
  # hashed app.<hash>.css plus manifest.json under
  # src/feedback_triage/static/css/. Both are gitignored.
  setup:css:
    desc: Download the Tailwind Standalone CLI binary into .tools/
    cmds:
      - uv run python scripts/build_css.py --setup

  build:css:
    desc: Build the Tailwind CSS bundle (one-shot, minified, hashed)
    cmds:
      - uv run python scripts/build_css.py

  watch:css:
    desc: Watch CSS sources and templates; rebuild on change
    cmds:
      - uv run python scripts/build_css.py --watch

  # ── Linting & Formatting ───────────────────────────────────
  lint:
    desc: Lint (ruff check)
    cmds:
      - uv run ruff check src/ scripts/ tests/

  lint:fix:
    desc: Auto-fix lint issues
    cmds:
      - uv run ruff check --fix src/ scripts/ tests/

  fmt:
    desc: Format (ruff format)
    cmds:
      - uv run ruff format src/ scripts/ tests/

  fmt:check:
    desc: Check formatting without applying
    cmds:
      - uv run ruff format --check src/ scripts/ tests/

  # ── Type Checking ──────────────────────────────────────────
  typecheck:
    desc: mypy strict
    cmds:
      - uv run mypy

  # ── Security ───────────────────────────────────────────────
  security:
    desc: bandit security lint
    cmds:
      - uv run bandit -c pyproject.toml -r src/

  deptry:
    desc: Dependency hygiene (unused / missing / transitive)
    cmds:
      - uv run deptry src/

  # ── Quality Gate (CI mirror) ───────────────────────────────
  check:
    desc: Run lint + fmt:check + typecheck + test (incl. CSS build)
    deps: [build:css, lint, fmt:check, typecheck, test]

  # ── Build ──────────────────────────────────────────────────
  build:
    desc: Build sdist + wheel
    cmds:
      - uv build

  # ── Container ──────────────────────────────────────────────
  container:build:
    desc: Build container image
    cmds:
      - docker build -t feedback-triage-app -f Containerfile .

  container:run:
    desc: Run container locally (set DATABASE_URL via env)
    cmds:
      - docker run --rm -p 8000:8000 --env-file .env feedback-triage-app

  # ── Pre-commit ─────────────────────────────────────────────
  pre-commit:install:
    desc: Install all pre-commit hook stages
    cmds:
      - uv run pre-commit install
      - uv run pre-commit install --hook-type commit-msg
      - uv run pre-commit install --hook-type pre-push

  pre-commit:run:
    desc: Run pre-commit on all files
    cmds:
      - uv run pre-commit run --all-files

  pre-commit:update:
    desc: Update pre-commit hooks to latest versions
    cmds:
      - uv run pre-commit autoupdate

  pre-commit:hook:
    desc: "Run a single hook: task pre-commit:hook -- ruff"
    cmds:
      - uv run pre-commit run {{.CLI_ARGS}} --all-files

  # ── Documentation ──────────────────────────────────────────
  docs:serve:
    desc: Live-reload docs server
    env:
      # Suppress upstream Material for MkDocs 2.0 announcement banner so
      # `mkdocs build --strict` does not see stderr noise. Reassess once
      # squidfunk/mkdocs-material 10.x or Zensical lands.
      NO_MKDOCS_2_WARNING: "true"
    cmds:
      - uv run mkdocs serve

  docs:build:
    desc: Build docs site (strict mode)
    env:
      NO_MKDOCS_2_WARNING: "true"
    cmds:
      - uv run mkdocs build --strict

  # ── Release ────────────────────────────────────────────────
  release:
    desc: "Tag and push a release: task release -- v0.1.0"
    cmds:
      - git tag -a {{.CLI_ARGS}} -m "Release {{.CLI_ARGS}}"
      - git push origin {{.CLI_ARGS}}

  # ── Dev tooling (template-inherited; trim if unused) ───────
  dashboard:serve:
    desc: Local env-inspection dashboard
    cmds:
      - uv run --extra dashboard python -m tools.dev_tools.env_dashboard.app {{.CLI_ARGS}}

  doctor:
    desc: Diagnostics bundle for bug reports
    cmds:
      - uv run python scripts/doctor.py {{.CLI_ARGS}}

  doctor:env:
    desc: Environment health check
    cmds:
      - uv run python scripts/env_doctor.py {{.CLI_ARGS}}

  doctor:repo:
    desc: Repository health check
    cmds:
      - uv run python scripts/repo_doctor.py {{.CLI_ARGS}}

  doctor:git:
    desc: Git-focused health check
    cmds:
      - uv run python scripts/git_doctor.py {{.CLI_ARGS}}

  branch:
    desc: Switch to main, clean up stale branches, then create a new branch
    silent: false
    cmds:
      # Pre-flight: refuse to proceed (with actionable hints) when the
      # working tree has changes that would block `git switch main`.
      - uv run python scripts/branch_preflight.py
      - git switch main
      - echo ""
      - uv run python scripts/git_doctor.py --cleanup
      - uv run python scripts/git_doctor.py --new-branch

  clean:todo:
    desc: Archive completed TODO items
    cmds:
      - uv run python scripts/archive_todos.py {{.CLI_ARGS}}
